<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Francisco Javier Alonso Gonzalez">
    <title>Product Review</title>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <main>
        <h1>Product Review</h1>
        <form action="review.html" method="get">
            <label for="product">Product name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a product...</option>
            </select>

            <label>General Rating</label>
            <div class="rating">
                <input type="radio" name="rating" id="r1" value="1" required><label for="r1">★</label>
                <input type="radio" name="rating" id="r2" value="2"><label for="r2">★★</label>
                <input type="radio" name="rating" id="r3" value="3"><label for="r3">★★★</label>
                <input type="radio" name="rating" id="r4" value="4"><label for="r4">★★★★</label>
                <input type="radio" name="rating" id="r5" value="5"><label for="r5">★★★★★</label>
            </div>

            <label for="installDate">Installation Date</label>
            <input type="date" id="installDate" name="installDate" required>

            <label>Useful Features (check all that apply):</label>
            <label><input type="checkbox" name="features" value="durability"> Durability</label>
            <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
            <label><input type="checkbox" name="features" value="performance"> Performance</label>
            <label><input type="checkbox" name="features" value="design"> Design</label>

            <label for="review">Written Review (Optional)</label>
            <textarea id="review" name="review"></textarea>

            <label for="username">Username (Optional)</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>&copy; | Francisco Javier Alonso G. | Mexico</footer>
    <script src="scripts/form.js"></script>
</body>
</html>
